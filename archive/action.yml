name: DigitalOcean App Platform app archive
description: Archive (maintenance mode) an application on DigitalOcean App Platform. The app stops serving traffic and billing drops to storage-only rates.
branding:
  icon: 'archive'
  color: 'blue'

inputs:
  token:
    description: DigitalOcean Personal Access Token. See https://docs.digitalocean.com/reference/api/create-personal-access-token/ for creating a new token.
    required: true
  app_id:
    description: ID of the app to archive.
    required: false
    default: ''
  app_name:
    description: Name of the app to archive.
    required: false
    default: ''
  from_pr_preview:
    description: Use this if the app was deployed as a PR preview. The app name will be derived from the PR number.
    required: false
    default: 'false'
  ignore_not_found:
    description: Ignore if the app is not found.
    required: false
    default: 'false'

outputs:
  app:
    description: A JSON representation of the app after archiving.

runs:
  using: docker
  image: ../Dockerfile
  args: ['archive']
