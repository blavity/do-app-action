name: DigitalOcean App Platform app unarchive
description: Unarchive (restore from maintenance mode) an application on DigitalOcean App Platform. The app resumes serving traffic.
branding:
  icon: 'refresh-cw'
  color: 'blue'

inputs:
  token:
    description: DigitalOcean Personal Access Token. See https://docs.digitalocean.com/reference/api/create-personal-access-token/ for creating a new token.
    required: true
  app_id:
    description: ID of the app to unarchive.
    required: false
    default: ''
  app_name:
    description: Name of the app to unarchive.
    required: false
    default: ''
  from_pr_preview:
    description: Use this if the app was deployed as a PR preview. The app name will be derived from the PR number.
    required: false
    default: 'false'
  ignore_not_found:
    description: Ignore if the app is not found.
    required: false
    default: 'false'
  wait_for_live:
    description: Wait for the app to have a live URL after unarchiving.
    required: false
    default: 'true'
  wait_timeout:
    description: Maximum seconds to wait for the app to become live.
    required: false
    default: '300'

outputs:
  app:
    description: A JSON representation of the app after unarchiving.
  live_url:
    description: The live URL of the app once it is reachable (empty if wait_for_live is false or timed out).

runs:
  using: docker
  image: ../Dockerfile
  args: ['unarchive']
