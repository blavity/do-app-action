# https://taskfile.dev
version: "3"

vars:
  MODULE: github.com/blavity/do-app-action

tasks:
  default:
    desc: Show available tasks
    cmd: task --list

  fmt:
    desc: Format code with gofumpt and goimports
    cmds:
      - golangci-lint fmt ./...

  lint:
    desc: Run golangci-lint
    cmd: golangci-lint run ./...

  test:
    desc: Run tests with race detector
    cmd: go test -race -coverprofile=coverage.out ./...

  build:
    desc: Build all action binaries
    cmd: go build ./deploy ./archive ./delete ./unarchive

  check:
    desc: fmt + lint + test (run before pushing)
    cmds:
      - task: fmt
      - task: lint
      - task: test
