name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0.6.4.1.0

      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.11.3

      - name: Verify dependencies
        run: go mod verify

      - name: Run tests
        run: task test

      - name: Check coverage threshold
        run: |
          total=$(go tool cover -func coverage.out | awk '/^total:/{print $3}' | tr -d '%')
          echo "Total coverage: ${total}%"
          awk -v t="$total" 'BEGIN { if (t+0 < 80) { print "Coverage " t "% is below the 80% threshold"; exit 1 } }'

      - name: Upload coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage
          path: coverage.out

  build-check:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Build Docker image
        run: docker build --no-cache -t do-app-action:ci .
