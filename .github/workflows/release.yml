# Release workflow
#
# Triggered by semver tags pushed by release-please (e.g., v1.2.3).
# release-please already creates the GitHub Release; this workflow:
#   1. Builds and pushes the Docker image to GHCR (publish-image).
#
# The floating major-version git tag (e.g. v1 → v1.2.3) is moved by
# release-please.yml immediately after the release is created, so it does
# not need to be handled here.

name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing semver tag to build and publish (e.g. v1.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish-image:
    name: Build and push Docker image to GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: tags
        env:
          TAG: ${{ inputs.tag || github.ref_name }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::tag must match v<major>.<minor>.<patch>, got: $TAG"
            exit 1
          fi
          MAJOR=$(echo "$TAG" | sed 's/\(v[0-9]*\)\..*/\1/')
          echo "versioned=ghcr.io/${REPO_OWNER}/do-app-action:${TAG}" >> "$GITHUB_OUTPUT"
          echo "major=ghcr.io/${REPO_OWNER}/do-app-action:${MAJOR}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          push: true
          tags: |
            ${{ steps.tags.outputs.versioned }}
            ${{ steps.tags.outputs.major }}

